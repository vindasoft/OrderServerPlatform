# 项目相关配置
vindasoft:
  # 文件路径：指定上传文件的保存位置为当前目录（src）同级别的file文件夹下
  profile: ./file

  # 文件路径：指定上传文件的保存位置为当前目录下的file文件
  #profile: file

# spring配置
spring:
  # 数据源（数据库连接）的配置
  datasource:
    # 数据库连接池类型：使用阿里巴巴的Druid连接池（高效且功能强大）
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接地址（最重要的配置）
    # jdbc:mysql:// 表示使用jdbc连接mysql
    # localhost:3306 表示数据库在本地电脑，端口3306（mysql默认端口）
    # /vindsoft: 表示要连接的数据库名称（需要在MySQL数据库中创建这个数据库）
    # ?后面都是连接参数
    # useUnicode=true：表示使用Unicode字符集
    # characterEncoding=utf-8：表示使用utf-8编码（避免中文乱码）
    # zeroDateTimeBehavior=convertToNull：表示把0000-00-00这种日期转成null
    # allowMultiQueries=true：允许执行多条SQL
    # useSSL=true：表示启用SSL加密连接
    # serverTimezone=GMT%2B8 设置时区为东八区（北京时间）
    # 注意：vindasoft要换成你实际创建的数据库名
    url: jdbc:mysql://localhost:3306/vindasoft?useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: jwd123456
  # 安全配置: 配置用户名、密码后不用在控制台打印用户名和密码
  security:
    user:
      name: 123
      password: 123

# 系统服务的环境配置
server:
  port: 8080
  servlet:
    # 应用访问路径：根路径，访问地址为 http://localhost:8080/
    context-path: /

# 日志配置
logging:
  level:
    # 表示com.vindasoft包下的日志输出级别为debug
    # 日志级别从低到高：trace < debug < info < warn < error
    # debug级别会输出很详细的日志（包括提示信息）：适合开发阶段
    com.vindasoft: debug

    # 配置spring框架的日志级别
    # warn级别只输出警告和错误信息，减少控制台输出
    # 这样可以避免spring启动时的大量info日志，干扰我们看自己的日志
    org.springframework: warn

# Mybatis配置
mybatis:
  # 告诉mybatis 哪些包下的类需要映射(去哪里找对应的实体类映射)
  type-aliases-package: com.vindasoft.**.domain
  # 告诉mybatis 哪些包下的xml文件需要映射
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    # 日志实现：使用slf4j输出mybatis的sql日志（包含mybatis执行的SQL语句）
    # 注意：mybatis的日志级别高于spring的日志级别
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 令牌配置
token:
  # token的请求头名称： 前端需要传递token的请求头名称，后端才会从请求头中获取到token
  header: Authorization
  # 前后端约定好的令牌密钥：用于加密/解密token的字符串
  secret: abc13234
  # token有效期(300分钟)，过期后需要重新登录
  expireTime: 300